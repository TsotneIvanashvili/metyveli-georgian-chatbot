services:
  - type: web
    name: metyveli-backend
    env: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn backend.app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: PYTHON_VERSION
        value: 3.12.7
      # Paste your free Neon (or other external) Postgres connection string here.
      - key: DATABASE_URL
        sync: false
      - key: OLLAMA_BASE_URL
        value: https://ollama.com
      - key: OLLAMA_API_KEY
        sync: false
      - key: OLLAMA_MODEL
        value: qwen3.5
      - key: OLLAMA_TIMEOUT_SECONDS
        value: "120"
      - key: OLLAMA_CONTEXT_SIZE
        value: "4096"
      # Update this if Render assigns the frontend a different subdomain.
      - key: ALLOWED_ORIGINS
        value: https://metyveli-frontend.onrender.com
      - key: RAG_TOP_K
        value: "4"
      - key: RAG_MIN_SCORE
        value: "0.025"

  - type: web
    name: metyveli-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      # Update this if Render assigns the backend a different subdomain.
      - key: VITE_API_BASE_URL
        value: https://metyveli-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
